<vbox>
  <groupbox>
    <label><html:h2>Yorklib Exporter</html:h2></label>

    <checkbox preference="extensions.zotero.yorklib-exporter.wrapAbstract"
              native="true"
              label="Wrap abstract text at ~50 characters (preserves whole words)"/>

    <description style="max-width: 40em;">
      When enabled, the exporter inserts line breaks into the abstract
      (annote field) at word boundaries so it stays readable in viewers
      that do not wrap text. Words are never split.
    </description>
  </groupbox>
</vbox>
